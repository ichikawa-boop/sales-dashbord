<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スマサテ 商談ダッシュボード</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
:root{
  --bg:#0d0d1a; --surface:#131326; --surface2:#1a1a30; --surface3:#22223a;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.14);
  --text:#f0eeff; --text2:#9090bb; --radius:12px;
  --won:#39ff14; --lost:#ff6eb4; --pipe:#c77dff;
  --convert:#00f5ff; --neon-yellow:#ffe600; --neon-orange:#ff9500;
  --a:#1a8fff; --b:#ff9500; --d:#9090bb; --landing:#39ff14;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter','Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);font-size:14px;}
body::before{content:'';position:fixed;inset:0;z-index:-1;background:radial-gradient(ellipse at 15% 15%,rgba(199,125,255,.10) 0%,transparent 55%),radial-gradient(ellipse at 85% 85%,rgba(0,245,255,.07) 0%,transparent 55%),radial-gradient(ellipse at 65% 5%,rgba(255,110,180,.06) 0%,transparent 45%);pointer-events:none;}
#drop-zone{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;}
#drop-zone.drag-over{background:#150a28;}
.drop-box{border:2px dashed rgba(199,125,255,.4);border-radius:20px;padding:56px 80px;text-align:center;cursor:pointer;background:var(--surface);transition:all .2s;position:relative;overflow:hidden;}
.drop-box::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(199,125,255,.1) 0%,transparent 70%);pointer-events:none;}
.drop-box:hover{border-color:var(--pipe);box-shadow:0 0 40px rgba(199,125,255,.2);}
.drop-icon{font-size:56px;margin-bottom:16px;}
.drop-title{font-size:20px;font-weight:700;margin-bottom:8px;}
.drop-sub{font-size:13px;color:var(--text2);}
#file-input{display:none;}
#app{display:none;padding:28px;max-width:1380px;margin:0 auto;}
.top-bar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;background:var(--surface);border-radius:var(--radius);padding:14px 20px;border:1px solid var(--border2);margin-bottom:24px;box-shadow:0 0 20px rgba(199,125,255,.06);}
.top-bar-left{font-size:13px;color:var(--text2);}
.top-bar-left strong{color:var(--text);font-size:15px;}
.top-bar-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.member-filter{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.member-btn{border:1px solid var(--border2);border-radius:20px;padding:5px 14px;font-size:12px;cursor:pointer;background:var(--surface2);color:var(--text2);transition:all .15s;white-space:nowrap;}
.member-btn:hover{border-color:var(--pipe);color:var(--pipe);}
.member-btn.active{background:var(--pipe);color:#0d0d1a;border-color:var(--pipe);font-weight:700;box-shadow:0 0 12px rgba(199,125,255,.5);}
.btn-reload{background:none;border:1px solid var(--border2);border-radius:8px;padding:5px 14px;cursor:pointer;font-size:12px;color:var(--text2);transition:all .15s;}
.btn-reload:hover{border-color:var(--convert);color:var(--convert);}
.tab-bar{display:flex;gap:4px;margin-bottom:24px;background:var(--surface);border-radius:var(--radius);padding:6px;border:1px solid var(--border);}
.tab-btn{flex:1;text-align:center;padding:9px 16px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;color:var(--text2);transition:all .15s;}
.tab-btn.active{background:var(--surface3);color:var(--text);box-shadow:inset 0 0 0 1px var(--border2);}
.tab-btn:hover:not(.active){color:var(--text);}
.tab-section{display:none;}
.tab-section.active{display:block;}
.section-title{font-size:11px;font-weight:700;color:var(--text2);letter-spacing:.1em;text-transform:uppercase;margin:0 0 14px;}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:14px;margin-bottom:28px;}
.kpi-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:18px 20px;position:relative;overflow:hidden;transition:box-shadow .2s;}
.kpi-card:hover{box-shadow:0 0 24px rgba(199,125,255,.1);}
.kpi-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:var(--radius) var(--radius) 0 0;}
.kpi-card.c-won::after{background:var(--won);box-shadow:0 0 8px var(--won);}
.kpi-card.c-lost::after{background:var(--lost);box-shadow:0 0 8px var(--lost);}
.kpi-card.c-pipe::after{background:var(--pipe);box-shadow:0 0 8px var(--pipe);}
.kpi-card.c-convert::after{background:var(--convert);box-shadow:0 0 8px var(--convert);}
.kpi-card.c-accent::after{background:var(--neon-yellow);box-shadow:0 0 8px var(--neon-yellow);}
.kpi-card.c-orange::after{background:var(--neon-orange);box-shadow:0 0 8px var(--neon-orange);}
.kpi-label{font-size:11px;color:var(--text2);margin-bottom:8px;letter-spacing:.04em;}
.kpi-val{font-size:26px;font-weight:700;line-height:1;color:var(--text);}
.kpi-val.neon-won{color:var(--won);text-shadow:0 0 12px rgba(57,255,20,.5);}
.kpi-val.neon-lost{color:var(--lost);text-shadow:0 0 12px rgba(255,110,180,.5);}
.kpi-val.neon-pipe{color:var(--pipe);text-shadow:0 0 12px rgba(199,125,255,.5);}
.kpi-val.neon-convert{color:var(--convert);text-shadow:0 0 12px rgba(0,245,255,.5);}
.kpi-val.neon-orange{color:var(--neon-orange);text-shadow:0 0 12px rgba(255,149,0,.5);}
.kpi-sub{font-size:11px;color:var(--text2);margin-top:6px;}
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px;}
.chart-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:22px;margin-bottom:24px;}
.chart-card.full{grid-column:1/-1;}
.chart-wrap{position:relative;width:100%;}
.legend{display:flex;gap:16px;margin-bottom:12px;flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead tr{border-bottom:1px solid var(--border2);}
th{font-weight:700;color:var(--text2);text-align:left;padding:10px 12px;font-size:11px;letter-spacing:.05em;text-transform:uppercase;}
td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--surface2);}
.bar-bg{background:var(--surface3);border-radius:3px;height:6px;width:100%;overflow:hidden;min-width:80px;display:flex;}
.bar-fill{height:6px;border-radius:3px;}
.bar-seg{height:6px;}
.badge{display:inline-block;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:700;}
.badge-won{background:rgba(57,255,20,.15);color:var(--won);border:1px solid rgba(57,255,20,.3);}
.badge-mid{background:rgba(255,230,0,.15);color:var(--neon-yellow);border:1px solid rgba(255,230,0,.3);}
.badge-lost{background:rgba(255,110,180,.15);color:var(--lost);border:1px solid rgba(255,110,180,.3);}
.badge-convert{background:rgba(0,245,255,.15);color:var(--convert);border:1px solid rgba(0,245,255,.3);}
.badge-orange{background:rgba(255,149,0,.15);color:var(--neon-orange);border:1px solid rgba(255,149,0,.3);}
.kpi-yomi{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:700;}
.yomi-a{background:rgba(26,143,255,.2);color:#1a8fff;}
.yomi-b{background:rgba(255,149,0,.2);color:var(--neon-orange);}
.yomi-d{background:rgba(144,144,187,.2);color:var(--text2);}
.yomi-none{background:rgba(255,255,255,.05);color:#555577;}
.monthly-table-wrap{overflow-x:auto;margin-top:16px;}
.monthly-table{font-size:12px;width:auto;min-width:100%;}
.monthly-table th{white-space:nowrap;text-align:right;padding:7px 12px;}
.monthly-table th:first-child{text-align:left;}
.monthly-table td{text-align:right;padding:7px 12px;white-space:nowrap;}
.monthly-table td:first-child{text-align:left;font-weight:600;}
.notice{background:rgba(255,230,0,.08);border:1px solid rgba(255,230,0,.25);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--neon-yellow);margin-bottom:20px;}
/* yomi section inside pipeline tab */
.yomi-section{border-top:1px solid var(--border2);margin-top:28px;padding-top:24px;}
.phase-toggle{display:flex;gap:8px;margin-bottom:16px;}
.phase-tag{padding:4px 12px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--border2);color:var(--text2);background:var(--surface2);transition:all .15s;}
.phase-tag.active-won{background:rgba(57,255,20,.15);color:var(--won);border-color:var(--won);}
.phase-tag.active-lost{background:rgba(255,110,180,.15);color:var(--lost);border-color:var(--lost);}
.cross-wrap{overflow-x:auto;}
.cross-table{font-size:12px;white-space:nowrap;}
.cross-table th{padding:6px 10px;text-align:right;white-space:nowrap;}
.cross-table th:first-child{text-align:left;}
.cross-table td{padding:6px 10px;text-align:right;}
.cross-table td:first-child{text-align:left;font-weight:600;}
.detail-wrap{overflow-x:auto;}
.detail-table{font-size:12px;white-space:nowrap;}
.detail-table th,.detail-table td{padding:7px 10px;}
.month-row-clickable{cursor:pointer;}
.month-row-clickable:hover td{background:rgba(0,245,255,.05)!important;}
.month-row-selected td{background:rgba(0,245,255,.07)!important;font-weight:700;}
.month-filter-bar{display:flex;align-items:center;gap:8px;background:rgba(0,245,255,.07);border-radius:8px;padding:8px 14px;margin-bottom:16px;font-size:12px;color:var(--convert);}
.btn-clear{background:rgba(255,110,180,.15);color:var(--lost);border:1px solid var(--lost);border-radius:6px;padding:3px 10px;cursor:pointer;font-size:11px;}
@media(max-width:800px){.charts-row{grid-template-columns:1fr;}.tab-btn{font-size:11px;padding:7px 8px;}}
</style>
</head>
<body>
<div id="drop-zone">
  <div class="drop-box" onclick="document.getElementById('file-input').click()">
    <div class="drop-icon">📊</div>
    <div class="drop-title">Salesforce XLS をドロップ</div>
    <div class="drop-sub">またはクリックしてファイルを選択</div>
    <div class="drop-sub" style="margin-top:8px;font-size:11px;color:#6060aa">初回面談日・トライアル開始日・ヨミ確度列含む商談レポートに対応</div>
  </div>
  <div id="error-msg" style="color:var(--lost);font-size:13px;display:none;"></div>
</div>
<input type="file" id="file-input" accept=".xls,.xlsx">
<div id="app"></div>

<script>
const dropZone=document.getElementById('drop-zone');
const fileInput=document.getElementById('file-input');
const appDiv=document.getElementById('app');
const errMsg=document.getElementById('error-msg');
dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('drag-over');});
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('drag-over');handleFile(e.dataTransfer.files[0]);});
fileInput.addEventListener('change',e=>{if(e.target.files[0])handleFile(e.target.files[0]);});

let allRows=[],filename='';
let selectedMembers=new Set(['ALL']),currentTab='win',currentYomiMonth=null;
let charts={};

const WON=['受注'],LOST=['失注'];
const PIPELINE=['再提案','お試し開始待ち','事務手続き中','お試し打診中','お試し日調整中','結論回収中','お試し中','初回アポ待ち','お試し終了'];
const PHASE_ORDER=['初回アポ待ち','お試し打診中','お試し日調整中','お試し開始待ち','お試し中','お試し終了','再提案','結論回収中','事務手続き中'];
const YOMI_RATE={'Aヨミ':.8,'Bヨミ':.5,'Dヨミ':.2};
const YOMI_LABELS=['Aヨミ','Bヨミ','Dヨミ'];
const YOMI_BADGE={'Aヨミ':'yomi-a','Bヨミ':'yomi-b','Dヨミ':'yomi-d','未設定':'yomi-none'};

function resolveYomi(raw){
  const s=String(raw||'').trim();
  if(s==='Aヨミ'||s==='80')return'Aヨミ';
  if(s==='Bヨミ'||s==='50')return'Bヨミ';
  if(s==='Dヨミ'||s==='20')return'Dヨミ';
  return'未設定';
}

function handleFile(file){
  filename=file.name;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=new Uint8Array(e.target.result);
      let rows,headers;
      if(file.name.endsWith('.xlsx')){
        const wb=XLSX.read(data,{type:'array'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const arr=XLSX.utils.sheet_to_json(ws,{header:1});
        headers=arr[0];
        rows=arr.slice(1).map(r=>{const o={};headers.forEach((h,i)=>o[h]=r[i]??'');return o;});
      }else{
        const text=new TextDecoder('shift-jis').decode(data);
        const doc=new DOMParser().parseFromString(text,'text/html');
        const trs=doc.querySelectorAll('table tr');
        headers=[...trs[0].querySelectorAll('td,th')].map(td=>td.textContent.trim());
        rows=[];
        for(let i=1;i<trs.length;i++){
          const cells=[...trs[i].querySelectorAll('td,th')].map(td=>td.textContent.trim());
          if(cells.length===headers.length){const o={};headers.forEach((h,j)=>o[h]=cells[j]);rows.push(o);}
        }
      }
      const today=new Date();today.setHours(0,0,0,0);
      const thisMonth=new Date(today.getFullYear(),today.getMonth(),1);
      allRows=rows.map(r=>{
        const phase=(r['フェーズ']||'').trim();
        const owner=(r['商談 所有者']||'').trim();
        const closeDate=parseDate(r['完了予定日']);
        const lostDate=parseDate(r['最終フェーズ変更日']);
        const createdDate=parseDate(r['作成日']);
        const firstMeetDate=parseDate(r['初回面談日']);
        const trialDate=parseDate(r['トライアル開始日']);
        const amt=parseFloat(r['金額'])||0;
        const dealDays=parseFloat(r['商談日数'])||null;
        const yomi=resolveYomi(r['ヨミ確度']);
        const rate=YOMI_RATE[yomi]??null;
        // 完了日：受注=完了予定日、失注=最終フェーズ変更日
        const endDate=WON.includes(phase)?closeDate:lostDate;
        // ステージ間日数（0以上のみ有効）
        const dMeetToTrial=(firstMeetDate&&trialDate)?Math.max(0,daysDiff(trialDate,firstMeetDate)):null;
        const dTrialToEnd=(trialDate&&endDate)?Math.max(0,daysDiff(endDate,trialDate)):null;
        const monthKey=closeDate?mkKey(closeDate):null;
        const createdKey=createdDate?mkKey(createdDate):null;
        const isTarget=PIPELINE.includes(phase)&&closeDate&&closeDate>=thisMonth;
        return{...r,_phase:phase,_owner:owner,_date:closeDate,_lostDate:lostDate,_createdDate:createdDate,_firstMeetDate:firstMeetDate,_trialDate:trialDate,_amount:amt,_dealDays:dealDays,_yomi:yomi,_rate:rate,_landing:rate!==null?amt*rate:0,_endDate:endDate,_dMeetToTrial:dMeetToTrial,_dTrialToEnd:dTrialToEnd,_monthKey:monthKey,_createdKey:createdKey,_isTarget:isTarget};
      });
      selectedMembers=new Set(['ALL']);currentTab='win';currentYomiMonth=null;
      dropZone.style.display='none';appDiv.style.display='block';
      renderAll();
    }catch(err){errMsg.textContent='読み込みに失敗しました: '+err.message;errMsg.style.display='block';}
  };
  reader.readAsArrayBuffer(file);
}

function parseDate(v){if(!v||String(v).trim()==='')return null;const s=String(v).trim().replace(/\//g,'-');const d=new Date(s);return isNaN(d)?null:d;}
function daysDiff(a,b){return Math.round((a-b)/(1000*60*60*24));}
function mkKey(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
function mLabel(k){const[y,m]=k.split('-');return y+'/'+(+m)+'月';}
function fmt(n){return Math.round(n).toLocaleString('ja-JP');}
function fmtM(n){return n>=10000?(n/10000).toFixed(1)+'万':fmt(n);}
function pct(a,b){return b>0?Math.round(a/b*100):0;}
function avg(arr){const v=arr.filter(x=>x!=null&&!isNaN(x));return v.length?Math.round(v.reduce((s,x)=>s+x,0)/v.length):null;}
function fmtAvg(v){return v!=null?v+'日':'—';}

function isAllSelected(){return selectedMembers.has('ALL');}
function getFiltered(){return isAllSelected()?allRows:allRows.filter(r=>selectedMembers.has(r._owner));}
function destroyCharts(){Object.values(charts).forEach(c=>{try{c.destroy();}catch(e){}});charts={};}

const GC='rgba(255,255,255,0.05)',TC='#9090bb';
const CNEON={won:'rgba(57,255,20,.75)',lost:'rgba(255,110,180,.75)',rate:'#00f5ff',pipe:'#c77dff',convert:'#00f5ff',cv_rate:'#ffe600',a:'#1a8fff',b:'#ff9500',d:'#6a6a8a'};

function renderAll(){
  const members=[...new Set(allRows.map(r=>r._owner).filter(Boolean))].sort();
  const rows=getFiltered();
  const total=rows.length;
  const wonRows=rows.filter(r=>WON.includes(r._phase));
  const lostRows=rows.filter(r=>LOST.includes(r._phase));
  const pipeRows=rows.filter(r=>PIPELINE.includes(r._phase));
  const wonAmt=wonRows.reduce((s,r)=>s+r._amount,0);
  const pipeAmt=pipeRows.reduce((s,r)=>s+r._amount,0);
  const convertedRows=rows.filter(r=>r._firstMeetDate!==null);

  // === 月次（受注/失注） ===
  const monthlyMap={};
  rows.forEach(r=>{
    let k=null;
    if(WON.includes(r._phase)&&r._date)k=mkKey(r._date);
    else if(LOST.includes(r._phase)&&r._lostDate)k=mkKey(r._lostDate);
    if(!k)return;
    if(!monthlyMap[k])monthlyMap[k]={won:0,lost:0,allTotal:0};
    monthlyMap[k].allTotal++;
    if(WON.includes(r._phase))monthlyMap[k].won++;else monthlyMap[k].lost++;
  });
  const winMonths=Object.keys(monthlyMap).sort().filter(k=>monthlyMap[k].won+monthlyMap[k].lost>0);

  // === 月次（商談化率） ===
  const cvMonthlyMap={};
  rows.forEach(r=>{if(!r._createdKey)return;if(!cvMonthlyMap[r._createdKey])cvMonthlyMap[r._createdKey]={total:0,notConverted:0};cvMonthlyMap[r._createdKey].total++;});
  rows.forEach(r=>{if(LOST.includes(r._phase)&&!r._firstMeetDate&&r._lostDate){const lk=mkKey(r._lostDate);if(lk&&cvMonthlyMap[lk])cvMonthlyMap[lk].notConverted++;}});
  const cvMonths=Object.keys(cvMonthlyMap).sort().filter(k=>cvMonthlyMap[k].total>0);

  // === 担当者別月次（受注/失注） ===
  const memberMonthlyMap={};
  winMonths.forEach(k=>{memberMonthlyMap[k]={};members.forEach(m=>{memberMonthlyMap[k][m]={won:0,lost:0};});memberMonthlyMap[k]['全体']={won:0,lost:0};});
  allRows.forEach(r=>{let k=null;if(WON.includes(r._phase)&&r._date)k=mkKey(r._date);else if(LOST.includes(r._phase)&&r._lostDate)k=mkKey(r._lostDate);if(!k||!memberMonthlyMap[k])return;const f=WON.includes(r._phase)?'won':'lost';if(memberMonthlyMap[k][r._owner])memberMonthlyMap[k][r._owner][f]++;memberMonthlyMap[k]['全体'][f]++;});

  // === 担当者別月次（商談化率） ===
  const memberCvMap={};
  cvMonths.forEach(k=>{memberCvMap[k]={};members.forEach(m=>{memberCvMap[k][m]={total:0,notConverted:0};});memberCvMap[k]['全体']={total:0,notConverted:0};});
  allRows.forEach(r=>{const ck=r._createdKey;if(ck&&memberCvMap[ck]){if(memberCvMap[ck][r._owner])memberCvMap[ck][r._owner].total++;memberCvMap[ck]['全体'].total++;}if(LOST.includes(r._phase)&&!r._firstMeetDate&&r._lostDate){const lk=mkKey(r._lostDate);if(lk&&memberCvMap[lk]){if(memberCvMap[lk][r._owner])memberCvMap[lk][r._owner].notConverted++;memberCvMap[lk]['全体'].notConverted++;}}});

  // === 担当者別集計 + 商談日数 ===
  const memberStats=members.map(m=>{
    const mr=allRows.filter(r=>r._owner===m);
    const mw=mr.filter(r=>WON.includes(r._phase)),ml=mr.filter(r=>LOST.includes(r._phase));
    const mp=mr.filter(r=>PIPELINE.includes(r._phase));
    const t=mr.length,w=mw.length,l=ml.length,p=mp.length;
    const cv=mr.filter(r=>r._firstMeetDate).length;
    const notCv=ml.filter(r=>!r._firstMeetDate).length;
    return{m,t,w,l,p,wr:pct(w,t),lr:pct(l,t),wa:mw.reduce((s,r)=>s+r._amount,0),pa:mp.reduce((s,r)=>s+r._amount,0),cv,cvr:pct(cv,t),notCv,
      // 商談日数
      avgDays:avg(mr.map(r=>r._dealDays)),
      avgDaysWon:avg(mw.map(r=>r._dealDays)),
      avgDaysLost:avg(ml.map(r=>r._dealDays)),
      // ステージ間日数（受注）
      avgM2T_won:avg(mw.map(r=>r._dMeetToTrial)),
      avgT2E_won:avg(mw.map(r=>r._dTrialToEnd)),
      // ステージ間日数（失注）
      avgM2T_lost:avg(ml.map(r=>r._dMeetToTrial)),

  const yomiStat=calcYomiStat(yomiFiltered);
